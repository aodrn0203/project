  html, body { width:100%; height:100%; margin:0; padding:0; background: var(--background-color); }
  :root{
    --background-color:#f5fffa;--selected-color:#4fe1f4;--edge-color:#548f9e;
    --edge-incoming-color:#698b69;--edge-outgoing-color:#008acd;--edge-incoming-outgoing-color:black;
    --cluster-label-bg-color:#e8eaed;--node-bg-color:#f4f5f1;
    --symbol-default-bg-color:var(--node-bg-color);--symbol-default-border-color:#889f4e;--symbol-default-text-color:#363636;
    --function-bg-color:#bafbd0;--function-border-color:#4ac26b;
  }
  .callgraph{--bold-border:3.2;width:100%;height:100%;outline:none;cursor:default;-webkit-user-select:none;user-select:none}
  .callgraph>#graph0>polygon:first-of-type{fill:var(--background-color)}
  .callgraph>#graph0>#faded-group>:where(.node,.cluster){opacity:.2}
  .callgraph>#graph0>#faded-group>.edge{opacity:.05}
  .callgraph .edge>path:not(.hover-path){stroke:var(--edge-color);stroke-width:3}
  .callgraph .edge>polygon{stroke:var(--edge-color);fill:var(--edge-color)}
  .callgraph .edge>path.hover-path{stroke:transparent;stroke-width:15}
  .callgraph .edge:hover{--edge-color:var(--selected-color)}
  .callgraph .edge.incoming{--edge-color:var(--edge-incoming-color)}
  .callgraph .edge.outgoing{--edge-color:var(--edge-outgoing-color)}
  .callgraph .edge.incoming.outgoing{--edge-color:var(--edge-incoming-outgoing-color)}
  .callgraph .cluster polygon{stroke-width:1.6}
  .callgraph .cluster .cluster-label{cursor:pointer;fill:var(--cluster-label-bg-color);rx:18px}
  .callgraph .cluster text{pointer-events:none}
  .callgraph .node>rect{rx:20px;fill:var(--node-bg-color);filter:url(#shadow)}
  .callgraph .node>.title>text{font-weight:700}
  .callgraph .cell{--bg-color:var(--symbol-default-bg-color);--border-color:var(--symbol-default-border-color);--border-width:1.6}
  .callgraph .cell>rect{rx:10px;fill:var(--bg-color);stroke:var(--border-color);stroke-width:var(--border-width);cursor:pointer}
  .callgraph .cell>text{fill:var(--symbol-default-text-color);pointer-events:none}
  .callgraph .cell.function{--bg-color:var(--function-bg-color);--border-color:var(--function-border-color)}
  .callgraph .cell:where(.highlight,.selected,:hover){--border-width:var(--bold-border)}
  .callgraph .cell.highlight>rect{stroke:url(#highlightGradient)}
  .callgraph .cell.selected>rect{filter:drop-shadow(3px 3px 6px var(--border-color))}
  .hint{position:fixed;top:10px;right:14px;font-family:Arial,sans-serif;font-size:12px;color:#5a6;background:#fff;border:1px solid #cde;border-radius:8px;padding:6px 10px;opacity:.92}
  .legend{position:fixed;bottom:12px;left:14px;font-family:Arial,sans-serif;font-size:12px;color:#456;background:#fff;border:1px solid #cde;border-radius:8px;padding:8px 12px;line-height:1.7}
  .legend b{font-weight:700}
  .sw{display:inline-block;width:22px;height:0;border-top:3px solid;vertical-align:middle;margin-right:6px}
</style>

<script>
(function(){
  var svg = document.querySelector('.callgraph');
  var allCells = Array.prototype.slice.call(svg.querySelectorAll('.cell'));
  var allEdges = Array.prototype.slice.call(svg.querySelectorAll('.edge'));
  var fadedGroup = svg.querySelector('#faded-group');
  var graph = svg.querySelector('#graph0');

  var cellById = {};
  allCells.forEach(function(c){ cellById[c.id] = c; });

  function clearState(){
    allCells.forEach(function(c){ c.classList.remove('selected','highlight'); });
    allEdges.forEach(function(e){ e.classList.remove('incoming','outgoing'); });
    Array.prototype.slice.call(fadedGroup.children).forEach(function(ch){ graph.appendChild(ch); });
  }

  function fade(el){ fadedGroup.appendChild(el); }

  function select(cellId){
    clearState();
    var selCell = cellById[cellId];
    if(!selCell) return;
    selCell.classList.add('selected');

    var keepCells = {}; keepCells[cellId] = true;
    var keepEdges = [];

    allEdges.forEach(function(e){
      var from = e.getAttribute('data-from');
      var to = e.getAttribute('data-to');
      if(from === cellId){ e.classList.add('outgoing'); keepEdges.push(e); keepCells[to] = true; }
      if(to === cellId){ e.classList.add('incoming'); keepEdges.push(e); keepCells[from] = true; }
    });

    Object.keys(keepCells).forEach(function(id){
      if(id === cellId) return;
      var c = cellById[id];
      if(c) c.classList.add('highlight');
    });

    allCells.forEach(function(c){ if(!keepCells[c.id]) fade(c); });
    allEdges.forEach(function(e){ if(keepEdges.indexOf(e) === -1) fade(e); });
  }

  var clickMoved = false;
  allCells.forEach(function(cell){
    cell.addEventListener('click', function(ev){
      ev.stopPropagation();
      if(clickMoved){ clickMoved = false; return; }
      if(cell.classList.contains('selected')){ clearState(); }
      else { select(cell.id); }
    });
  });

  svg.addEventListener('click', function(){
    if(clickMoved){ clickMoved = false; return; }
    clearState();
  });

  /* ===== 마우스 휠 줌 + 드래그 패닝 ===== */
  var scale = 1, tx = 0, ty = 0;
  var MIN = 0.2, MAX = 8;

  function apply(){
    graph.setAttribute('transform', 'matrix(' + scale + ' 0 0 ' + scale + ' ' + tx + ' ' + ty + ')');
  }
  apply();

  // 커서 위치를 기준으로 확대/축소
  svg.addEventListener('wheel', function(ev){
    ev.preventDefault();
    var rect = svg.getBoundingClientRect();
    if(!rect.width || !rect.height) return;
    // svg 뷰박스 좌표로 변환 (viewBox 0 0 610 513)
    var vb = svg.viewBox.baseVal;
    var px = (ev.clientX - rect.left) / rect.width  * vb.width;
    var py = (ev.clientY - rect.top)  / rect.height * vb.height;

    var factor = ev.deltaY < 0 ? 1.12 : 1/1.12;
    var newScale = scale * factor;
    if(newScale < MIN) newScale = MIN;
    if(newScale > MAX) newScale = MAX;
    factor = newScale / scale;

    // 커서 아래 지점이 고정되도록 평행이동 보정
    tx = px - (px - tx) * factor;
    ty = py - (py - ty) * factor;
    scale = newScale;
    apply();
  }, { passive: false });

  // 드래그로 이동 (휠 외 보조 조작)
  var dragging = false, sx = 0, sy = 0, otx = 0, oty = 0, moved = 0;
  svg.addEventListener('mousedown', function(ev){
    dragging = true; moved = 0;
    sx = ev.clientX; sy = ev.clientY; otx = tx; oty = ty;
  });
  window.addEventListener('mousemove', function(ev){
    if(!dragging) return;
    var rect = svg.getBoundingClientRect();
    var vb = svg.viewBox.baseVal;
    var dx = (ev.clientX - sx) / rect.width  * vb.width;
    var dy = (ev.clientY - sy) / rect.height * vb.height;
    moved += Math.abs(ev.clientX - sx) + Math.abs(ev.clientY - sy);
    tx = otx + dx; ty = oty + dy;
    apply();
  });
  window.addEventListener('mouseup', function(){
    if(dragging && moved > 4) clickMoved = true; // 드래그였으면 클릭 무시
    dragging = false;
  });

  svg.style.cursor = 'grab';
  svg.addEventListener('mousedown', function(){ svg.style.cursor = 'grabbing'; });
  window.addEventListener('mouseup', function(){ svg.style.cursor = 'grab'; });
})();
</script>
